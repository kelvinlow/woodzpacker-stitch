<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Article Detail | {{websiteName}}</title>
    <script src="layout.js"></script>
    <style>
      body {
        visibility: hidden;
        opacity: 0;
      }
    </style>
  </head>
  <body
    class="bg-background text-on-surface font-body selection:bg-primary/30 opacity-0 transition-opacity duration-300"
  >
    <main class="pt-32 pb-24">
      <div class="max-w-6xl mx-auto px-6 md:px-8">
        <div
          id="article-loading"
          class="min-h-[50vh] flex items-center justify-center"
        >
          <div class="text-center space-y-4">
            <div
              class="w-12 h-12 mx-auto rounded-full border border-primary/30 border-t-primary animate-spin"
            ></div>
            <p
              class="font-label text-xs tracking-[0.35em] uppercase text-on-surface-variant"
            >
              Loading Article
            </p>
          </div>
        </div>

        <div id="article-error" class="hidden min-h-[50vh] items-center justify-center">
          <div
            class="max-w-xl mx-auto text-center bg-surface-container border border-outline-variant/20 px-8 py-12"
          >
            <p class="font-label text-xs tracking-[0.35em] uppercase text-primary mb-4">
              Article Unavailable
            </p>
            <h1 class="font-headline text-3xl md:text-4xl mb-4">
              Unable to load this journal entry
            </h1>
            <p
              id="article-error-message"
              class="text-on-surface-variant text-lg leading-relaxed"
            ></p>
          </div>
        </div>

        <div id="article-shell" class="hidden">
          <header id="article-hero" class="mb-20 md:mb-24"></header>
          <article
            id="article-content"
            class="max-w-3xl mx-auto text-lg leading-relaxed"
          ></article>
        </div>
      </div>
    </main>

    <script>
      const DEFAULT_ARTICLE_ID = "33c63a7bb3db80298069dc4f9a6b60fa";

      const state = {
        loading: document.getElementById("article-loading"),
        error: document.getElementById("article-error"),
        errorMessage: document.getElementById("article-error-message"),
        shell: document.getElementById("article-shell"),
        hero: document.getElementById("article-hero"),
        content: document.getElementById("article-content"),
      };

      const escapeHtml = (value = "") =>
        value
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");

      const getArticleId = () => {
        const url = new URL(window.location.href);
        return url.searchParams.get("id") || DEFAULT_ARTICLE_ID;
      };

      const getApiUrl = (articleId) => `https://woodzpacker-stitch.lowshinsheng.workers.dev/v1/article/${articleId}`;

      const getFirstParagraph = (blocks) =>
        blocks.find((block) => block.type === "paragraph" && block.text?.trim());

      const getFirstImage = (blocks) =>
        blocks.find((block) => block.type === "image" && block.url);

      const compactExcerpt = (text = "", maxLength = 180) => {
        const normalized = text.replace(/\s+/g, " ").trim();
        if (normalized.length <= maxLength) return normalized;
        return `${normalized.slice(0, maxLength).trimEnd()}...`;
      };

      const setMeta = (title, description) => {
        document.title = `${title} | Woodzpacker`;

        let descriptionTag = document.querySelector('meta[name="description"]');
        if (!descriptionTag) {
          descriptionTag = document.createElement("meta");
          descriptionTag.name = "description";
          document.head.appendChild(descriptionTag);
        }
        descriptionTag.content = description;
      };

      const renderHero = (title, blocks) => {
        const introBlock = getFirstParagraph(blocks);
        const imageBlock = getFirstImage(blocks);
        const intro =
          introBlock?.text?.trim() ||
          "A curated reflection on agarwood, ritual, and the meditative arts.";

        setMeta(title, compactExcerpt(intro));

        state.hero.innerHTML = `
          <div class="grid grid-cols-1 md:grid-cols-12 gap-10 items-end">
            <div class="md:col-span-7">
              <div class="inline-flex items-center gap-4 mb-6">
                <span class="font-label text-xs tracking-[0.35em] uppercase text-primary">Journal Entry</span>
                <span class="w-12 h-px bg-outline-variant"></span>
                <span class="font-label text-[10px] tracking-[0.3em] uppercase text-on-surface-variant">Article ${escapeHtml(getArticleId().slice(0, 8))}</span>
              </div>
              <h1 class="font-headline text-4xl md:text-6xl leading-tight mb-6">${escapeHtml(title)}</h1>
              <p class="text-xl md:text-2xl italic text-on-surface-variant leading-relaxed max-w-2xl">
                ${escapeHtml(compactExcerpt(intro, 240))}
              </p>
            </div>
            <div class="md:col-span-5">
              ${
                imageBlock
                  ? `
                    <figure class="relative overflow-hidden bg-surface-container-low aspect-[4/5]">
                      <img
                        src="${escapeHtml(imageBlock.url)}"
                        alt="${escapeHtml(imageBlock.caption || title)}"
                        class="w-full h-full object-cover opacity-90"
                      />
                      <div class="absolute inset-0 bg-gradient-to-t from-background/70 to-transparent"></div>
                    </figure>
                  `
                  : `
                    <div class="aspect-[4/5] bg-surface-container border border-outline-variant/20 flex items-end p-8">
                      <p class="font-headline text-3xl text-primary italic">沉香 · Journal</p>
                    </div>
                  `
              }
            </div>
          </div>
        `;
      };

      const renderListItem = (block, listType) => {
        const nested = renderNestedChildren(block.children || [], listType);
        return `<li class="mb-3">${escapeHtml(block.text || "")}${nested}</li>`;
      };

      const renderNestedChildren = (children, parentListType) => {
        if (!children.length) return "";

        const childListType =
          children[0].type === "numbered_list_item" ? "ol" : parentListType;
        const className =
          childListType === "ol"
            ? "mt-3 pl-6 list-decimal text-on-surface/90 leading-[1.9]"
            : "mt-3 pl-6 list-disc text-on-surface/90 leading-[1.9]";

        const items = children
          .map((child) => {
            if (
              child.type === "bulleted_list_item" ||
              child.type === "numbered_list_item"
            ) {
              return renderListItem(child, childListType);
            }
            return renderBlock(child);
          })
          .join("");

        return `<${childListType} class="${className}">${items}</${childListType}>`;
      };

      const renderTable = (block) => {
        const rows = Array.isArray(block.children) ? block.children : [];
        if (!rows.length) return "";

        const body = rows
          .filter((row) => row.type === "table_row")
          .map((row) => {
            const cells = Array.isArray(row.cells) ? row.cells : [];
            const columns = cells
              .map((cell) => {
                const text = Array.isArray(cell) ? cell.join(" ") : "";
                return `<td class="border border-outline-variant/20 px-4 py-3 align-top">${escapeHtml(text)}</td>`;
              })
              .join("");

            return `<tr>${columns}</tr>`;
          })
          .join("");

        return `
          <div class="my-10 overflow-x-auto bg-surface-container-low border border-outline-variant/20">
            <table class="min-w-full border-collapse text-left text-base">
              <tbody>${body}</tbody>
            </table>
          </div>
        `;
      };

      const renderBlock = (block) => {
        const text = escapeHtml(block.text || "");

        switch (block.type) {
          case "heading_1":
            return `<section class="mt-16 mb-6"><h2 class="font-headline text-3xl md:text-4xl text-primary leading-tight">${text}</h2></section>`;
          case "heading_2":
            return `<section class="mt-14 mb-5"><h3 class="font-headline text-2xl md:text-3xl text-on-surface leading-snug">${text}</h3></section>`;
          case "heading_3":
            return `<section class="mt-10 mb-4"><h4 class="font-label text-sm tracking-[0.25em] uppercase text-secondary">${text}</h4></section>`;
          case "paragraph":
            if (!text.trim()) return "";
            return `<p class="mb-6 text-on-surface/90 leading-[1.95]">${text}</p>`;
          case "image":
            if (!block.url) return "";
            return `
              <figure class="my-12 md:my-16 -mx-4 md:-mx-12">
                <div class="bg-surface-container-low p-3 md:p-4">
                  <img
                    src="${escapeHtml(block.url)}"
                    alt="${escapeHtml(block.caption || "Article image")}"
                    class="w-full h-auto object-cover max-h-[42rem]"
                  />
                  ${
                    block.caption
                      ? `<figcaption class="mt-4 text-center font-body italic text-sm text-on-surface-variant">${escapeHtml(block.caption)}</figcaption>`
                      : ""
                  }
                </div>
              </figure>
            `;
          case "divider":
            return `<div class="my-12 border-t border-outline-variant/20"></div>`;
          case "bulleted_list_item":
            if (!text.trim()) return "";
            return renderListItem(block, "ul");
          case "numbered_list_item":
            if (!text.trim()) return "";
            return renderListItem(block, "ol");
          case "table":
            return renderTable(block);
          case "table_row":
            return "";
          default:
            return "";
        }
      };

      const renderContent = (blocks) => {
        const contentBlocks = [];
        let i = 0;

        while (i < blocks.length) {
          const block = blocks[i];

          if (block.type === "bulleted_list_item") {
            const items = [];
            while (i < blocks.length && blocks[i].type === "bulleted_list_item") {
              items.push(renderBlock(blocks[i]));
              i += 1;
            }
            contentBlocks.push(
              `<ul class="mb-8 pl-6 list-disc text-on-surface/90 leading-[1.9]">${items.join("")}</ul>`
            );
            continue;
          }

          if (block.type === "numbered_list_item") {
            const items = [];
            while (i < blocks.length && blocks[i].type === "numbered_list_item") {
              items.push(renderBlock(blocks[i]));
              i += 1;
            }
            contentBlocks.push(
              `<ol class="mb-8 pl-6 list-decimal text-on-surface/90 leading-[1.9]">${items.join("")}</ol>`
            );
            continue;
          }

          contentBlocks.push(renderBlock(block));
          i += 1;
        }

        state.content.innerHTML = `
          <div class="mb-12 pb-8 border-b border-outline-variant/10">
            <p class="font-label text-[10px] tracking-[0.35em] uppercase text-on-surface-variant">
              Rendered from Worker API blocks
            </p>
          </div>
          ${contentBlocks.join("")}
        `;
      };

      const showError = (message) => {
        state.loading.classList.add("hidden");
        state.shell.classList.add("hidden");
        state.error.classList.remove("hidden");
        state.error.classList.add("flex");
        state.errorMessage.textContent = message;
      };

      const showArticle = () => {
        state.loading.classList.add("hidden");
        state.error.classList.add("hidden");
        state.error.classList.remove("flex");
        state.shell.classList.remove("hidden");
      };

      const loadArticle = async () => {
        const articleId = getArticleId();

        try {
          const response = await fetch(getApiUrl(articleId));
          if (!response.ok) {
            throw new Error(`API request failed with status ${response.status}`);
          }

          const data = await response.json();
          const title = data.title || "The Meditative Void Journal";
          const blocks = Array.isArray(data.blocks) ? data.blocks : [];

          if (!blocks.length) {
            throw new Error("This article does not contain any renderable blocks.");
          }

          renderHero(title, blocks);
          renderContent(blocks);
          showArticle();
        } catch (error) {
          showError(error.message || "Unknown error while loading article.");
        }
      };

      loadArticle();
    </script>
  </body>
</html>
