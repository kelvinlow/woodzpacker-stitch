<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Product Detail | {{websiteName}}</title>
    <script src="layout.js"></script>
    <style>
      body {
        visibility: hidden;
        opacity: 0;
      }
      .custom-scrollbar::-webkit-scrollbar { width: 2px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: rgba(233,195,73,0.05); }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(233,195,73,0.2); }
      details > summary { list-style: none; }
      details > summary::-webkit-details-marker { display: none; }
      details[open] .accordion-chevron { transform: rotate(180deg); }
      .accordion-chevron { transition: transform 0.3s ease; }
      .thumbnail-btn.active img { filter: grayscale(0); }
      .thumbnail-btn.active { opacity: 1; border-color: rgba(233,195,73,0.4); }
    </style>
  </head>

  <body class="bg-background text-on-surface font-body selection:bg-primary/30 opacity-0 transition-opacity duration-300">
    <main class="pb-24 pt-24">
      <div id="product-loading" class="flex min-h-[60vh] items-center justify-center px-6">
        <div class="space-y-4 text-center">
          <div class="mx-auto h-12 w-12 rounded-full border border-primary/30 border-t-primary animate-spin"></div>
          <p class="font-label text-xs uppercase tracking-[0.35em] text-on-surface-variant">Loading Product</p>
        </div>
      </div>

      <div id="product-error" class="hidden px-6">
        <div class="mx-auto max-w-2xl border border-outline-variant/20 bg-surface-container-low px-8 py-14 text-center">
          <p class="font-label text-xs uppercase tracking-[0.35em] text-primary mb-4">Product Unavailable</p>
          <h1 class="font-headline text-4xl mb-4">Unable to load this product</h1>
          <p id="product-error-message" class="text-lg leading-relaxed text-on-surface-variant"></p>
        </div>
      </div>

      <div id="product-shell" class="hidden"></div>
    </main>

    <script>
      (() => {
        const DEFAULT_PRODUCT_ID = "";
        const FALLBACK_IMAGES = [
          "https://lh3.googleusercontent.com/aida-public/AB6AXuA4HPFnExBffoVATx6PO6adc6b2BIQlpQjiBsfuEMkG2Yzs4rquKJeE9MYnsfJWzC_m2p9mcvgKPV8qo-6r7VjBr6JPbf3HBS_23JZnBYTSm5TMPNCEQ1S3wpza20ezLTGIXfqsnEggZFcW7o83n_EWnX4hB2Vwsq9q7nP0zGzut7MmClMgvhvOk2iWG8u1nVdoyXvcRNAh-sWORmMQY4aVod3YpTj9g4ricprdMydMfBwrURpoaAZ-mQaHq_0RiftI3d_RxIRtbSkJ",
          "https://lh3.googleusercontent.com/aida-public/AB6AXuCjPVwzAL4YhgO-Q_f_6ndpgbkH5S4x9Rrf9nXl_-S1WyVh0rsIsaYyzEikVAxHvV8pxy72ZPgt2kjTF2asazuvNrlvcCVHDhNdzyNmgFGOusg5I20PiGs3U8qMSqfHkHBku3-qhZlxxCGdKij_Q-TaJQXw4KsSM9HaDT3CmGaANjc6_1np7vg6kHosflQwTTyzwxzJJDTYxTnJ4zWASay-G4_2rHu-CPAUV8wB8_GWKqf8DKugvzSusAJhch9D74iNL91nnL2bxDxm",
          "https://lh3.googleusercontent.com/aida-public/AB6AXuCE4LP2eSntR8d-sNrg5HK4IeYM_TGlqzTYEcQ6U9HIWwVSf2XEw-spX1ce_OGaiJlS3cRXTQE2Q_90tk99T3eCP-30uwwn9guiCKLTGaG4PPQMixYcnbeAodhCbJ5pt8qHaTkK3koEyna998taEWW5t_xC0xp1I_Z2kVgpQL7pPc1ctTIqYi267kV2_ZHBZiM32PI_edOwhmeXrOrBEWOKKeCgo4WPAYjfxqohDVrgnsmvMQpAQ3qOvhh-0Hzx2db54z2eXQ7q6a7a",
          "https://lh3.googleusercontent.com/aida-public/AB6AXuDoSOmozArvC2AWUzYhh98TyVxqgooBD-JGp7f2Rek2IKU42sjtMCIeYX2-NcVLviCZgMWGwgqBPwsFcIJgBERAqbNxAreIy1wNACxt7O5gcWk1r7u_Ativ1hLV-MBbJJrXnRf6el6iLjMGRx28Vz-eKLKXrhYjVCxC-OPqA-N4GiXKDa_yXVsNE7hHdavEzyF6rdclTuPf2SzMAR9Tsmie9wmBaUylq-7ogtfbKQAJgVLfL-_WKZpSG3jLCK2lepI15z5X6efXnAE5",
          "https://lh3.googleusercontent.com/aida-public/AB6AXuBOkZtrlKhl349dHLtQscjpk6RSdecT4BO3Et1fYCM5YTPToZnzpqJxlWGhKPTo3oO3lQ9DGFG4me3kgsw-aRrSbF41xoxiWtL5Vdww1clHN5ZJsbrWg60f5lQasZs_oM9qDCD6EW-Dp_U5LtMnRDwMCI72-mGL6InMSnkvM6bv2iJRrOKXIkh31HHh-G_K3iRf0bVhXkill_19H_0ivGwgwGLwrX5JTw4iE_R_JOwbk-baxzaqP0Og5KIBmkc-xJp607hwmnh8VOdA",
          "https://lh3.googleusercontent.com/aida-public/AB6AXuDJ7tmp1HH33cWAd-yX9ymh6ulUy1iTyd8Yjwn2FR1w8k7qedFRhlbkU1hoCCmfQUqWYGd-wpwHt3Veaplm1WM2F8r7jtlgBCTCMAyMIJHLb82aq--8N1NJheQgW0B4dU-FNcRMGMq1ydjPwa0LTafZhPiCw9CxEW6drUUNu6BIakT59EXFWZdRNA7qbbBitvPv5rqyJ9jNCepVNP502uDua7HKstJQ0_9hpXXbg1PSNgoYu2VvkzLjlNFdPQDLtY6gsYdaqwh1HT0u"
        ];

        const state = {
          loading: document.getElementById("product-loading"),
          error: document.getElementById("product-error"),
          errorMessage: document.getElementById("product-error-message"),
          shell: document.getElementById("product-shell")
        };

        function escapeHtml(value) {
          return String(value || "").replace(/[&<>\"']/g, (character) => {
            const entities = {
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              "\"": "&quot;",
              "'": "&#39;"
            };
            return entities[character] || character;
          });
        }

        function getApiBase() {
          return window.location.protocol === "file:"
            ? "http://127.0.0.1:8787"
            : (window.WOODZPACKER_CONFIG?.workerBaseUrl || window.location.origin);
        }

        function getProductId() {
          const url = new URL(window.location.href);
          return url.searchParams.get("id") || DEFAULT_PRODUCT_ID;
        }

        function formatCurrency(value) {
          if (typeof value !== "number") return "Price on request";
          return new Intl.NumberFormat("en-US", {
            style: "currency",
            currency: "USD",
            maximumFractionDigits: value % 1 === 0 ? 0 : 2
          }).format(value);
        }

        function formatDate(value) {
          if (!value) return "N/A";
          const date = new Date(value);
          if (Number.isNaN(date.getTime())) return value;
          return new Intl.DateTimeFormat("en", {
            year: "numeric",
            month: "long",
            day: "numeric"
          }).format(date);
        }

        function getImages(product) {
          const gallery = Array.isArray(product.gallery) ? product.gallery.filter(Boolean) : [];
          if (gallery.length) return gallery;
          return FALLBACK_IMAGES;
        }

        function getPrimaryPrice(product) {
          return typeof product.discountPrice === "number"
            ? product.discountPrice
            : product.sellingPrice;
        }

        function getStatusLabel(product) {
          if (product.stock > 0) {
            return product.status || "Available";
          }
          return product.status || "Out of stock";
        }

        function getAttributeValue(value, fallback) {
          return escapeHtml(value || fallback);
        }

        function renderEditorialSection(blocks) {
          if (!Array.isArray(blocks) || !blocks.length) {
            return "";
          }

          return `
            <section class="px-6 lg:px-10 mt-20">
              <div class="border border-outline-variant/12 bg-surface-container-low p-8 lg:p-10">
                <div class="mb-10 border-b border-outline-variant/10 pb-6">
                  <p class="font-label text-[10px] uppercase tracking-[0.3em] text-primary/70">Extended Notes</p>
                  <h2 class="mt-4 font-headline text-4xl leading-tight">Primary source content from the product record.</h2>
                </div>
                <article class="mx-auto max-w-3xl text-lg leading-relaxed">
                  ${renderBlocks(blocks)}
                </article>
              </div>
            </section>
          `;
        }

        function renderBlocks(blocks) {
          const rendered = [];
          let index = 0;

          while (index < blocks.length) {
            const block = blocks[index];

            if (block.type === "bulleted_list_item") {
              const items = [];
              while (index < blocks.length && blocks[index].type === "bulleted_list_item") {
                items.push(renderListItem(blocks[index], "ul"));
                index += 1;
              }
              rendered.push(`<ul class="mb-8 pl-6 list-disc text-on-surface/90 leading-[1.9]">${items.join("")}</ul>`);
              continue;
            }

            if (block.type === "numbered_list_item") {
              const items = [];
              while (index < blocks.length && blocks[index].type === "numbered_list_item") {
                items.push(renderListItem(blocks[index], "ol"));
                index += 1;
              }
              rendered.push(`<ol class="mb-8 pl-6 list-decimal text-on-surface/90 leading-[1.9]">${items.join("")}</ol>`);
              continue;
            }

            rendered.push(renderBlock(block));
            index += 1;
          }

          return rendered.join("");
        }

        function renderBlock(block) {
          const text = escapeHtml(block.text || "");

          switch (block.type) {
            case "heading_1":
              return `<section class="mt-16 mb-6"><h2 class="font-headline text-3xl md:text-4xl text-primary leading-tight">${text}</h2></section>`;
            case "heading_2":
              return `<section class="mt-14 mb-5"><h3 class="font-headline text-2xl md:text-3xl text-on-surface leading-snug">${text}</h3></section>`;
            case "heading_3":
              return `<section class="mt-10 mb-4"><h4 class="font-label text-sm tracking-[0.25em] uppercase text-secondary">${text}</h4></section>`;
            case "paragraph":
              if (!text.trim()) return "";
              return `<p class="mb-6 text-on-surface/90 leading-[1.95]">${text}</p>`;
            case "image":
              if (!block.url) return "";
              return `
                <figure class="my-12">
                  <div class="bg-surface p-3 md:p-4">
                    <img
                      src="${escapeHtml(block.url)}"
                      alt="${escapeHtml(block.caption || "Product image")}"
                      class="w-full h-auto object-cover max-h-[42rem]"
                    />
                    ${block.caption ? `<figcaption class="mt-4 text-center font-body italic text-sm text-on-surface-variant">${escapeHtml(block.caption)}</figcaption>` : ""}
                  </div>
                </figure>
              `;
            case "table":
              return renderTable(block);
            case "divider":
              return `<div class="my-12 border-t border-outline-variant/20"></div>`;
            default:
              return "";
          }
        }

        function renderListItem(block, listType) {
          const nested = renderNestedChildren(block.children || [], listType);
          return `<li class="mb-3">${escapeHtml(block.text || "")}${nested}</li>`;
        }

        function renderNestedChildren(children, parentListType) {
          if (!children.length) return "";

          const childListType = children[0].type === "numbered_list_item" ? "ol" : parentListType;
          const className = childListType === "ol"
            ? "mt-3 pl-6 list-decimal text-on-surface/90 leading-[1.9]"
            : "mt-3 pl-6 list-disc text-on-surface/90 leading-[1.9]";

          const items = children.map((child) => {
            if (child.type === "bulleted_list_item" || child.type === "numbered_list_item") {
              return renderListItem(child, childListType);
            }
            return renderBlock(child);
          }).join("");

          return `<${childListType} class="${className}">${items}</${childListType}>`;
        }

        function renderTable(block) {
          const rows = Array.isArray(block.children) ? block.children : [];
          if (!rows.length) return "";

          const body = rows
            .filter((row) => row.type === "table_row")
            .map((row) => {
              const cells = Array.isArray(row.cells) ? row.cells : [];
              const columns = cells
                .map((cell) => {
                  const text = Array.isArray(cell) ? cell.join(" ") : "";
                  return `<td class="border border-outline-variant/20 px-4 py-3 align-top">${escapeHtml(text)}</td>`;
                })
                .join("");

              return `<tr>${columns}</tr>`;
            })
            .join("");

          return `
            <div class="my-10 overflow-x-auto bg-surface border border-outline-variant/20">
              <table class="min-w-full border-collapse text-left text-base">
                <tbody>${body}</tbody>
              </table>
            </div>
          `;
        }

        function setMeta(product) {
          document.title = `${product.productName} | Woodzpacker`;
          let descriptionTag = document.querySelector('meta[name="description"]');
          if (!descriptionTag) {
            descriptionTag = document.createElement("meta");
            descriptionTag.name = "description";
            document.head.appendChild(descriptionTag);
          }
          descriptionTag.content = product.description || `${product.productName} in the Woodzpacker collection.`;
        }

        function renderProduct(product) {
          const images = getImages(product);
          const primaryPrice = formatCurrency(getPrimaryPrice(product));
          const comparePrice = typeof product.discountPrice === "number" &&
            typeof product.sellingPrice === "number" &&
            product.discountPrice !== product.sellingPrice
            ? formatCurrency(product.sellingPrice)
            : "";
          const scentProfile = Array.isArray(product.scentProfile) && product.scentProfile.length
            ? product.scentProfile
            : [product.material || "Curated Material", product.origin || "Collector Source"];
          const heroImage = images[0];

          setMeta(product);

          state.shell.innerHTML = `
            <section class="px-6 lg:px-10">
              <div class="grid gap-8 xl:grid-cols-[1.1fr_0.9fr]">
                <div class="overflow-hidden border border-outline-variant/12 bg-surface-container-low">
                  <div class="grid min-h-[34rem] md:grid-cols-[5.5rem_minmax(0,1fr)]">
                    <div id="thumbnail-column" class="custom-scrollbar flex gap-4 overflow-x-auto border-b border-outline-variant/10 p-4 md:flex-col md:overflow-y-auto md:border-b-0 md:border-r">
                      ${images.map((image, index) => `
                        <button
                          class="thumbnail-btn ${index === 0 ? "active" : "opacity-40"} h-20 w-16 shrink-0 overflow-hidden border border-transparent transition-all duration-500"
                          data-src="${escapeHtml(image)}"
                          data-caption="${escapeHtml(scentProfile[index % scentProfile.length])}"
                          type="button"
                        >
                          <img
                            alt="${escapeHtml(product.productName)} thumbnail ${index + 1}"
                            class="h-full w-full object-cover grayscale transition-all duration-700 hover:grayscale-0"
                            src="${escapeHtml(image)}"
                          />
                        </button>
                      `).join("")}
                    </div>
                    <div class="relative min-h-[28rem] overflow-hidden">
                      <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_left,rgba(233,195,73,0.16),transparent_34%)]"></div>
                      <img
                        id="main-gallery-image"
                        alt="${escapeHtml(product.productName)}"
                        class="h-full w-full object-cover transition-all duration-700 ease-out"
                        src="${escapeHtml(heroImage)}"
                      />
                      <div class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-background to-transparent px-8 py-10">
                        <p class="font-label text-[10px] uppercase tracking-[0.3em] text-primary/60">Detailed Observation</p>
                        <p id="gallery-caption" class="mt-2 font-headline text-2xl italic text-on-surface/85">${escapeHtml(scentProfile[0])}</p>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="border border-outline-variant/12 bg-surface-container-low/80 backdrop-blur-sm">
                  <div class="space-y-8 p-8 lg:p-10">
                    <div class="flex flex-wrap items-center justify-between gap-4">
                      <a class="font-label text-[10px] uppercase tracking-[0.28em] text-on-surface-variant/60 hover:text-primary transition-colors" href="/products.html">
                        Back to collection
                      </a>
                      <span class="rounded-full border border-outline-variant/20 px-3 py-1 font-label text-[10px] uppercase tracking-[0.22em] text-primary">${escapeHtml(getStatusLabel(product))}</span>
                    </div>

                    <div>
                      <p class="font-label text-[10px] uppercase tracking-[0.35em] text-primary/70">${escapeHtml(product.productCategory || "Collection")} / ${escapeHtml(product.supplier || "Woodzpacker")}</p>
                      <h1 class="mt-4 font-headline text-4xl leading-tight lg:text-5xl">${escapeHtml(product.productName)}</h1>
                      <p class="mt-5 max-w-2xl text-lg leading-relaxed text-on-surface-variant">${escapeHtml(product.description)}</p>
                    </div>

                    <div class="flex flex-wrap items-end gap-5 border-y border-outline-variant/10 py-6">
                      <div>
                        <p class="font-headline text-3xl text-primary">${escapeHtml(primaryPrice)}</p>
                        ${comparePrice ? `<p class="mt-2 text-sm text-on-surface-variant/50 line-through">${escapeHtml(comparePrice)}</p>` : ""}
                      </div>
                      <div class="grid gap-2 text-sm text-on-surface-variant">
                        <p><span class="font-label text-[10px] uppercase tracking-[0.22em] text-primary/70">Stock</span> ${escapeHtml(String(product.stock || 0))}</p>
                        <p><span class="font-label text-[10px] uppercase tracking-[0.22em] text-primary/70">Created</span> ${escapeHtml(formatDate(product.createdTime))}</p>
                      </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                      <div class="border border-outline-variant/10 bg-surface/50 p-4">
                        <p class="font-label text-[10px] uppercase tracking-[0.24em] text-primary/70">Origin</p>
                        <p class="mt-2 font-headline text-lg">${getAttributeValue(product.origin, "Curated Source")}</p>
                      </div>
                      <div class="border border-outline-variant/10 bg-surface/50 p-4">
                        <p class="font-label text-[10px] uppercase tracking-[0.24em] text-primary/70">Grade</p>
                        <p class="mt-2 font-headline text-lg">${getAttributeValue(product.grade, "Collection Grade")}</p>
                      </div>
                      <div class="border border-outline-variant/10 bg-surface/50 p-4">
                        <p class="font-label text-[10px] uppercase tracking-[0.24em] text-primary/70">Density</p>
                        <p class="mt-2 font-headline text-lg">${getAttributeValue(product.density, "Balanced")}</p>
                      </div>
                      <div class="border border-outline-variant/10 bg-surface/50 p-4">
                        <p class="font-label text-[10px] uppercase tracking-[0.24em] text-primary/70">Aged</p>
                        <p class="mt-2 font-headline text-lg">${getAttributeValue(product.aged, "By source")}</p>
                      </div>
                    </div>

                    <div class="grid gap-3 sm:grid-cols-2">
                      <button class="w-full border border-primary bg-primary px-6 py-4 font-label text-xs uppercase tracking-[0.28em] text-on-primary transition-colors hover:bg-primary-fixed-dim" type="button">
                        Enquire
                      </button>
                      <button class="w-full border border-outline-variant/20 px-6 py-4 font-label text-xs uppercase tracking-[0.28em] text-on-surface transition-colors hover:border-primary/30 hover:text-primary" type="button">
                        Save Reference
                      </button>
                    </div>

                    <div class="flex flex-wrap gap-3">
                      ${scentProfile.map((note) => `
                        <span class="border border-outline-variant/20 bg-surface/40 px-3 py-2 font-label text-[10px] uppercase tracking-[0.2em] text-on-surface-variant/80">
                          ${escapeHtml(note)}
                        </span>
                      `).join("")}
                    </div>

                    <div class="divide-y divide-outline-variant/10">
                      <details class="group py-5" open>
                        <summary class="flex cursor-pointer items-center justify-between">
                          <span class="font-label text-xs uppercase tracking-[0.22em] text-on-surface/80 group-hover:text-primary transition-colors">Product Story</span>
                          <span class="material-symbols-outlined accordion-chevron text-sm text-outline">expand_more</span>
                        </summary>
                        <div class="pt-4 text-sm leading-relaxed text-on-surface-variant">${escapeHtml(product.story)}</div>
                      </details>
                      <details class="group py-5">
                        <summary class="flex cursor-pointer items-center justify-between">
                          <span class="font-label text-xs uppercase tracking-[0.22em] text-on-surface/80 group-hover:text-primary transition-colors">Material Origin</span>
                          <span class="material-symbols-outlined accordion-chevron text-sm text-outline">expand_more</span>
                        </summary>
                        <div class="pt-4 text-sm leading-relaxed text-on-surface-variant">${escapeHtml(product.materialOrigin)}</div>
                      </details>
                      <details class="group py-5">
                        <summary class="flex cursor-pointer items-center justify-between">
                          <span class="font-label text-xs uppercase tracking-[0.22em] text-on-surface/80 group-hover:text-primary transition-colors">Care Guide</span>
                          <span class="material-symbols-outlined accordion-chevron text-sm text-outline">expand_more</span>
                        </summary>
                        <div class="pt-4 text-sm leading-relaxed text-on-surface-variant">${escapeHtml(product.careGuide)}</div>
                      </details>
                      <details class="group py-5">
                        <summary class="flex cursor-pointer items-center justify-between">
                          <span class="font-label text-xs uppercase tracking-[0.22em] text-on-surface/80 group-hover:text-primary transition-colors">Shipping Notes</span>
                          <span class="material-symbols-outlined accordion-chevron text-sm text-outline">expand_more</span>
                        </summary>
                        <div class="pt-4 text-sm leading-relaxed text-on-surface-variant">${escapeHtml(product.shippingNotes)}</div>
                      </details>
                    </div>
                  </div>
                </div>
              </div>
            </section>

            <section class="px-6 lg:px-10 mt-20">
              <div class="grid gap-6 lg:grid-cols-[1.1fr_0.9fr]">
                <article class="border border-outline-variant/12 bg-surface-container-low p-8 lg:p-10">
                  <p class="font-label text-[10px] uppercase tracking-[0.3em] text-primary/70">Material Profile</p>
                  <h2 class="mt-4 font-headline text-4xl leading-tight">A slower read on the piece.</h2>
                  <p class="mt-6 text-lg leading-relaxed text-on-surface-variant">${escapeHtml(product.story)}</p>
                  <div class="mt-8 grid gap-4 md:grid-cols-2">
                    <div class="border border-outline-variant/10 bg-surface/50 p-5">
                      <p class="font-label text-[10px] uppercase tracking-[0.22em] text-primary/70">Material</p>
                      <p class="mt-2 font-headline text-2xl">${getAttributeValue(product.material, "Natural Material")}</p>
                    </div>
                    <div class="border border-outline-variant/10 bg-surface/50 p-5">
                      <p class="font-label text-[10px] uppercase tracking-[0.22em] text-primary/70">Size</p>
                      <p class="mt-2 font-headline text-2xl">${getAttributeValue(product.size, "Collector Size")}</p>
                    </div>
                    <div class="border border-outline-variant/10 bg-surface/50 p-5">
                      <p class="font-label text-[10px] uppercase tracking-[0.22em] text-primary/70">Manufactured</p>
                      <p class="mt-2 font-headline text-2xl">${escapeHtml(formatDate(product.manufactoryDate))}</p>
                    </div>
                    <div class="border border-outline-variant/10 bg-surface/50 p-5">
                      <p class="font-label text-[10px] uppercase tracking-[0.22em] text-primary/70">Category</p>
                      <p class="mt-2 font-headline text-2xl">${getAttributeValue(product.productCategory, "Collection")}</p>
                    </div>
                  </div>
                </article>

                <article class="overflow-hidden border border-outline-variant/12 bg-surface-container-low">
                  <div class="relative h-full min-h-[24rem]">
                    <img
                      alt="${escapeHtml(product.productName)} contextual image"
                      class="h-full w-full object-cover"
                      src="${escapeHtml(images[Math.min(1, images.length - 1)])}"
                    />
                    <div class="absolute inset-0 bg-gradient-to-t from-background via-background/10 to-transparent"></div>
                    <div class="absolute inset-x-0 bottom-0 p-8">
                      <p class="font-label text-[10px] uppercase tracking-[0.3em] text-primary/70">Source & Care</p>
                      <p class="mt-3 text-lg leading-relaxed text-on-surface-variant">${escapeHtml(product.materialOrigin)}</p>
                    </div>
                  </div>
                </article>
              </div>
            </section>
            ${renderEditorialSection(product.blocks)}
          `;

          bindGallery();
        }

        function bindGallery() {
          const thumbs = state.shell.querySelectorAll(".thumbnail-btn");
          const mainImg = state.shell.querySelector("#main-gallery-image");
          const caption = state.shell.querySelector("#gallery-caption");
          if (!thumbs.length || !mainImg) return;

          mainImg.style.transition = "opacity 0.25s ease";

          thumbs.forEach((btn) => {
            btn.addEventListener("click", () => {
              const nextSrc = btn.getAttribute("data-src");
              const nextCaption = btn.getAttribute("data-caption");
              mainImg.style.opacity = "0";
              window.setTimeout(() => {
                mainImg.src = nextSrc;
                mainImg.onload = () => {
                  mainImg.style.opacity = "1";
                };
                if (mainImg.complete) mainImg.style.opacity = "1";
              }, 180);

              if (caption && nextCaption) caption.textContent = nextCaption;

              thumbs.forEach((thumb) => {
                thumb.classList.remove("active");
                thumb.classList.add("opacity-40");
              });
              btn.classList.add("active");
              btn.classList.remove("opacity-40");
            });
          });
        }

        async function loadProduct() {
          const productId = getProductId();
          if (!productId) {
            state.loading.classList.add("hidden");
            state.error.classList.remove("hidden");
            state.errorMessage.textContent = "Missing product identifier.";
            return;
          }

          try {
            const response = await fetch(`${getApiBase()}/v1/product/${encodeURIComponent(productId)}`, {
              headers: { Accept: "application/json" }
            });

            if (!response.ok) {
              const payload = await response.json().catch(() => ({}));
              throw new Error(payload.error || `Product request failed with ${response.status}`);
            }

            const product = await response.json();
            state.loading.classList.add("hidden");
            state.shell.classList.remove("hidden");
            renderProduct(product);
          } catch (error) {
            state.loading.classList.add("hidden");
            state.error.classList.remove("hidden");
            state.errorMessage.textContent = error.message || "Unknown error";
          }
        }

        loadProduct();
      })();
    </script>
  </body>
</html>
